function previewCampaigns(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      let rows = [];
      if(file.name.endsWith('.csv')){
        const lines = ev.target.result.split(/\r?\n/).filter(l=>l.trim());
        const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
        rows = lines.slice(1).map(l=>{ const v=l.split(','); const o={}; headers.forEach((h,i)=>o[h]=(v[i]||'').trim()); return o; });
      } else {
        const wb = XLSX.read(ev.target.result,{type:'binary'});
        rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
        rows = rows.map(r=>{ const o={}; Object.keys(r).forEach(k=>o[k.toLowerCase().trim()]=String(r[k]).trim()); return o; });
      }
      importPreview = rows.filter(r=>r.tipo&&r.titulo&&r.desc&&r.desde&&r.hasta).map(r=>({
        tipo: r.tipo, titulo: r.titulo, desc: r.desc,
        descFull: r.detalle||r.desc, desde: r.desde, hasta: r.hasta,
        clusters: r.clusters ? (r.clusters.toLowerCase()==='todos'?['todos']:r.clusters.split('|').map(s=>s.trim())) : ['todos'],
        adjuntos: [],
      }));
      const ignored = rows.length - importPreview.length;
      const area = document.getElementById('import-preview-area');
      if(!importPreview.length){ area.innerHTML=`<div class="warn-box">No se encontraron filas válidas. Revisá que las columnas tengan los nombres correctos.</div>`; return; }
      area.innerHTML = `
      <div class="preview-wrap">
        <div class="preview-header">
          <span class="preview-title">${importPreview.length} campaña${importPreview.length!==1?'s':''} listas para importar${ignored>0?` · ${ignored} fila${ignored!==1?'s':''} ignorada${ignored!==1?'s':''}`:''}
          </span>
          <button class="btn btn-primary btn-sm" onclick="confirmImport()">Importar todas</button>
        </div>
        <table class="preview">
          <thead><tr><th>Tipo</th><th>Título</th><th>Desde</th><th>Hasta</th><th>Clusters</th></tr></thead>
          <tbody>${importPreview.map(c=>`
            <tr>
              <td><span class="tag tag-${c.tipo.toLowerCase()}">${c.tipo}</span></td>
              <td>${c.titulo}</td><td>${fmtDate(c.desde)}</td><td>${fmtDate(c.hasta)}</td>
              <td style="font-size:11px;color:var(--text2)">${c.clusters.includes('todos')?'Todos':c.clusters.join(', ')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    } catch(err){ toast('Error al leer el archivo'); }
  };
  file.name.endsWith('.csv') ? reader.readAsText(file,'UTF-8') : reader.readAsBinaryString(file);
}

function confirmImport(){

function toggleAll(e){
  if(e){e.preventDefault();e.stopPropagation();}
  chipsSel=['todos'];
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  var el=document.getElementById('chip-todos'); if(el)el.classList.add('on');
  return false;
}
function toggleCluster(cl,e){
  if(e){e.preventDefault();e.stopPropagation();}
  var ti=chipsSel.indexOf('todos'); if(ti>-1)chipsSel.splice(ti,1);
  var i=chipsSel.indexOf(cl);
  if(i>-1)chipsSel.splice(i,1); else chipsSel.push(cl);
  if(!chipsSel.length)chipsSel=['todos'];
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  if(chipsSel.includes('todos')){ var et=document.getElementById('chip-todos'); if(et)et.classList.add('on'); }
  else { chipsSel.forEach(function(c){ var el=document.getElementById('chip-'+c.replace(/\s/g,'_')); if(el)el.classList.add('on'); }); }
  return false;
}

var adjuntosForm = [];

function agregarAdjunto(){
  var url = (document.getElementById('adj-url')||{value:''}).value.trim();
  var nombre = (document.getElementById('adj-nombre')||{value:''}).value.trim();
  if(!url){ toast('Pegá un link primero'); return false; }
  if(!nombre){
    // Auto-detect name from URL
    var parts = url.split('/'); nombre = decodeURIComponent(parts[parts.length-1]) || 'Archivo';
  }
  // Detect icon from extension
  adjuntosForm.push({url:url, nombre:nombre});
  renderAdjuntosForm();
  document.getElementById('adj-url').value='';
  document.getElementById('adj-nombre').value='';
  return false;
}

function getFileIcon(nombre){
  var ext = nombre.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].indexOf(ext)>-1) return '🖼️';
  if(ext==='pdf') return '📄';
  if(['xlsx','xls','csv'].indexOf(ext)>-1) return '📊';
  if(['doc','docx'].indexOf(ext)>-1) return '📝';
  if(['ppt','pptx'].indexOf(ext)>-1) return '📋';
  return '📎';
}

function renderAdjuntosForm(){
  var el = document.getElementById('adjuntos-list'); if(!el) return;
  if(!adjuntosForm.length){ el.innerHTML=''; return; }
  el.innerHTML = adjuntosForm.map(function(a,i){
    return '<div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;">' +
      '<span>' + getFileIcon(a.nombre) + '</span>' +
      '<span style="flex:1;color:var(--text)">' + a.nombre + '</span>' +
      '<button type="button" onclick="return quitarAdjunto(' + i + ')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 4px;">×</button>' +
    '</div>';
  }).join('');
}

function quitarAdjunto(i){
  adjuntosForm.splice(i,1);
  renderAdjuntosForm();
  return false;
}

function publishManual(e){
  if(e){e.preventDefault();e.stopPropagation();}
  var titulo=(document.getElementById('f-titulo')||{value:''}).value.trim();
  var desc=(document.getElementById('f-desc')||{value:''}).value.trim();
  var tipo=(document.getElementById('f-tipo')||{value:'Promo'}).value;
  var desde=(document.getElementById('f-desde')||{value:''}).value;
  var hasta=(document.getElementById('f-hasta')||{value:''}).value;
  var detalle=(document.getElementById('f-detalle')||{value:''}).value.trim();
  if(!titulo||!desc||!desde||!hasta){ toast('Completá todos los campos obligatorios'); return false; }
  var n={id:Date.now(),tipo:tipo,titulo:titulo,desc:desc,descFull:detalle||desc,desde:desde,hasta:hasta,clusters:chipsSel.slice(),nueva:true,adjuntos:adjuntosForm.slice()};
  adjuntosForm=[];
  campaigns.unshift(n); readings[n.id]={};
  stores.forEach(function(s){ readings[n.id][s.id]=false; });
  notifs.unshift({id:n.id,titulo:n.titulo,tipo:n.tipo,fecha:'Ahora',read:false});
  var dot=document.getElementById('notif-dot'); if(dot)dot.style.display='block';
  chipsSel=['todos']; toast('¡Campaña publicada!'); adminTab='campaigns'; renderAdmin();
  return false;
}

function importStores(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      let n=0;
      rows.forEach(r=>{
        const nombre=(r.nombre||r.Nombre||'').toString().trim();
        const cluster=(r.cluster||r.Cluster||'').toString().trim();
        if(nombre&&cluster&&!stores.find(s=>s.nombre.toLowerCase()===nombre.toLowerCase())){
          stores.push({id:Date.now()+Math.random(),nombre,cluster}); n++;
        }
      });
      toast(`${n} tienda${n!==1?'s':''} importada${n!==1?'s':''}`); renderAdmin();
    }catch(e){ toast('Error al leer el archivo'); }
  };
  reader.readAsBinaryString(file);
}
function addStore(){
  const n=(document.getElementById('s-nombre')||{value:''}).value.trim();
  const c=(document.getElementById('s-cluster')||{value:''}).value.trim();
  if(!n||!c){ toast('Completá nombre y cluster'); return; }
  if(stores.find(s=>s.nombre.toLowerCase()===n.toLowerCase())){ toast('Esa tienda ya existe'); return; }
  stores.push({id:Date.now(),nombre:n,cluster:c}); toast('Tienda agregada'); renderAdmin();
}
function removeStore(id){ stores=stores.filter(s=>s.id!==id); renderAdmin(); }

  return `<div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)">
  <table class="l-table">
    <thead><tr><th>Campaña</th><th>Clusters</th><th>Tiendas</th><th style="min-width:100px">Progreso</th><th>%</th></tr></thead>
    <tbody>${campaigns.map(c=>{
      const ts=stores.filter(s=>applies(c,s));
      const done=ts.filter(s=>readings[c.id]&&readings[c.id][s.id]).length;
      const pct=ts.length?Math.round(done/ts.length*100):0;
      return `<tr>
        <td><div style="font-weight:600;font-size:12px">${c.titulo}</div><div style="font-size:11px;color:var(--text3)">${fmtDate(c.desde)} → ${fmtDate(c.hasta)}</div></td>
        <td style="font-size:11px;color:var(--text2)">${c.clusters.includes('todos')?'Todos':c.clusters.join(', ')}</td>
        <td>${done}/${ts.length}</td>
        <td><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></td>
        <td style="font-weight:600">${pct}%</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ─── STORE VIEW ──────────────────────────────────────────────────────────────
function renderStore(){
  const cp = document.getElementById('main-content');
  if(!storeSel){
    cp.innerHTML=`
    <div class="selector-card">
      <div style="font-size:40px;margin-bottom:12px">🏪</div>
      <h2>¿Qué tienda sos?</h2>
      <p>Seleccioná tu tienda para ver las comunicaciones vigentes que te corresponden.</p>
      <div class="form-group" style="text-align:left">
        <label class="form-label">Tienda</label>
        <select class="form-select" id="sel-store">
          <option value="">— Seleccioná tu tienda —</option>
          ${stores.map(s=>`<option value="${s.id}">${s.nombre} (${s.cluster})</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="selectStore()">Ingresar</button>
    </div>`; return;
  }
  const myCampaigns = campaigns.filter(c=>applies(c,storeSel)&&isActive(c));
  const unread = myCampaigns.filter(c=>!(readings[c.id]&&readings[c.id][storeSel.id])).length;
  cp.innerHTML=`
  <div class="store-strip">
    <div style="font-size:24px">🏪</div>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:600">${storeSel.nombre}</div>
      <div style="font-size:12px;color:var(--text2)">${storeSel.cluster}</div>
    </div>
    ${unread>0?`<span class="badge-nueva">${unread} sin leer</span>`:''}
    <button class="btn btn-ghost btn-sm" onclick="storeSel=null;renderStore()">Cambiar tienda</button>
  </div>
  <div class="filter-bar" id="filter-bar">
    <input class="search-input" type="text" placeholder="Buscar campaña..." id="search-input" oninput="renderCards()" />
    <button class="filter-btn on" onclick="setFilter(this,'todos')">Todas</button>
    ${TIPOS.map(t=>`<button class="filter-btn" onclick="setFilter(this,'${t}')">${t}</button>`).join('')}
    <div class="view-toggle">
      <button class="view-btn ${viewCards?'on':''}" id="btn-cards" onclick="setView(true)">▦</button>
      <button class="view-btn ${!viewCards?'on':''}" id="btn-list" onclick="setView(false)">≡</button>
    </div>
  </div>
  <div class="counter" id="counter"></div>
  <div id="cards-area"></div>`;
  renderCards();
}

function selectStore(){
  const v=(document.getElementById('sel-store')||{value:''}).value;
  if(!v) return;
  storeSel=stores.find(s=>s.id==v); renderStore();
}
function setFilter(btn,tipo){
  filterType=tipo;
  document.querySelectorAll('#filter-bar .filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); renderCards();
}
function setView(c){ viewCards=c; renderStore(); }

function renderCards(){
  if(!storeSel) return;
  const q=(document.getElementById('search-input')||{value:''}).value.toLowerCase();
  const filtered=campaigns.filter(c=>applies(c,storeSel)&&isActive(c)&&(filterType==='todos'||c.tipo===filterType)&&(!q||c.titulo.toLowerCase().includes(q)||c.desc.toLowerCase().includes(q)));
  const area=document.getElementById('cards-area');
  document.getElementById('counter').textContent=`${filtered.length} comunicación${filtered.length!==1?'es':''} vigente${filtered.length!==1?'s':''}`;
  if(!filtered.length){ area.innerHTML='<div class="empty">No hay comunicaciones vigentes para tu tienda con los filtros seleccionados.</div>'; return; }
  const isRead=id=>readings[id]&&readings[id][storeSel.id];
  if(viewCards){
    area.innerHTML=`<div class="cards-grid">${filtered.map(c=>`
      <div class="card ${isRead(c.id)?'':'unread'}" onclick="openModal(${c.id})">
        <div class="card-thumb" style="background:${COLORS[c.tipo]}">${ICONS[c.tipo]}</div>
        <div class="card-body">
          <div class="card-row"><span class="tag tag-${c.tipo.toLowerCase()}">${c.tipo}</span><span class="date-tag">hasta ${fmtDate(c.hasta)}</span></div>
          <div class="card-title">${c.titulo}</div>
          <div class="card-desc">${c.desc}</div>
        </div>
        <div class="card-footer">
          <span class="vigencia"><span class="dot dot-green"></span>Vigente</span>
          ${isRead(c.id)?'<span class="badge-leida">Leída</span>':'<span class="badge-nueva">Nueva</span>'}
        </div>
      </div>`).join('')}</div>`;
  } else {
    area.innerHTML=`<div class="list-view">${filtered.map(c=>`
      <div class="list-row ${isRead(c.id)?'':'unread'}" onclick="openModal(${c.id})">
        <div class="list-icon" style="background:${COLORS[c.tipo]}">${ICONS[c.tipo]}</div>
        <div class="list-body">
          <div class="list-title">${c.titulo}</div>
          <div class="list-sub">${c.desc}</div>
        </div>
        <div class="list-right">
          <span class="tag tag-${c.tipo.toLowerCase()}">${c.tipo}</span>
          ${isRead(c.id)?'<span class="badge-leida">Leída</span>':'<span class="badge-nueva">Nueva</span>'}
        </div>
      </div>`).join('')}</div>`;
  }
}


function linkify(text){
  const urlRegex = /(https?:\/\/[^\s<>"]+)/g;
  return text.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:underline;word-break:break-all;">${url}</a>`);
}
// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(camId){
  const c=campaigns.find(x=>x.id===camId);
  const alreadyRead=storeSel&&readings[camId]&&readings[camId][storeSel.id];
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-head">
      <div style="display:flex;gap:7px;align-items:center">
        <span class="tag tag-${c.tipo.toLowerCase()}">${c.tipo}</span>
        <span style="font-size:11px;color:var(--text3)">${fmtDate(c.desde)} → ${fmtDate(c.hasta)}</span>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-thumb" style="background:${COLORS[c.tipo]}">${ICONS[c.tipo]}</div>
    <div class="modal-body">
      <h2 class="modal-title">${c.titulo}</h2>
      <p class="modal-text">${linkify(c.descFull)}</p>
      <div class="modal-grid">
        <div class="modal-field"><div class="modal-field-label">Inicio</div><div class="modal-field-val">${fmtDate(c.desde)}</div></div>
        <div class="modal-field"><div class="modal-field-label">Fin</div><div class="modal-field-val">${fmtDate(c.hasta)}</div></div>
        <div class="modal-field"><div class="modal-field-label">Clusters</div><div class="modal-field-val" style="font-size:11px">${c.clusters.includes('todos')?'Todos los clusters':c.clusters.join(', ')}</div></div>
        <div class="modal-field"><div class="modal-field-label">Estado</div><div class="modal-field-val">${isActive(c)?'🟢 Vigente':'🟡 No vigente'}</div></div>
      </div>
      ${(c.adjuntos&&c.adjuntos.length)?`
      <div style="margin-bottom:1rem">
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Archivos adjuntos</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          \${c.adjuntos.map(function(a){return '<a href="'+a.url+'" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border-radius:var(--radius-sm);text-decoration:none;border:1px solid var(--border);">'+
            '<span style="font-size:18px">'+getFileIcon(a.nombre)+'</span>'+
            '<span style="font-size:13px;font-weight:500;color:var(--text);flex:1">'+a.nombre+'</span>'+
            '<span style="font-size:11px;color:var(--blue)">Abrir →</span>'+
          '</a>';}).join('')}
        </div>
      </div>`:''}
      \${storeSel?`<button class="btn-confirm" \${alreadyRead?'disabled':''} onclick="confirmRead(\${camId})">\${alreadyRead?'✓ Ya confirmaste la lectura':'Confirmar lectura'}</button>`:''}
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function confirmRead(camId){
  readings[camId][storeSel.id]=true;
  closeModal(); toast('¡Lectura confirmada!'); renderStore();
}

// ─── NOTIFS ──────────────────────────────────────────────────────────────────
function toggleNotif(){
  const panel=document.getElementById('notif-panel');
  panel.style.display=panel.style.display==='block'?'none':'block';
  const list=document.getElementById('notif-list');
  if(!notifs.length){ list.innerHTML='<div class="notif-empty">Sin notificaciones nuevas</div>'; return; }
  list.innerHTML=notifs.map(n=>`
    <div class="notif-item ${n.read?'':'unread'}">
      <span style="font-size:16px">${ICONS[n.tipo]}</span>
      <div><div class="notif-item-text">${n.titulo}</div><div class="notif-item-sub">${n.fecha}</div></div>
    </div>`).join('');
}
function markAllRead(){
  notifs.forEach(n=>n.read=true);
  document.getElementById('notif-dot').style.display='none';
  toggleNotif(); toggleNotif();
}

function setRole(r){
  if(r==='admin'){
    const pwd = prompt('Ingresá la contraseña de administrador:');
    if(pwd !== 'Comuretailarg.2026'){
      alert('Contraseña incorrecta.');
      return;
    }
  }
  role=r; storeSel=null; render();
}

document.addEventListener('click',e=>{
  const panel=document.getElementById('notif-panel');
  const btn=document.getElementById('notif-btn');
  if(panel&&panel.style.display==='block'&&btn&&!btn.contains(e.target)&&!panel.contains(e.target))
    panel.style.display='none';
});

render();
</script>
